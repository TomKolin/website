<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Passive 2026</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body {font-family:Arial;background:#0f0f0f;color:#fff;text-align:center;padding:20px;}
h1 {color:#00ff88;}
button {background:#00ff88;color:#000;padding:15px 40px;font-size:20px;border:none;border-radius:10px;cursor:pointer;margin:20px;}
button:disabled {background:#555;color:#ccc;}
input, select {width:80%;padding:10px;margin:10px;border-radius:8px;border:none;}
#result {margin:20px;font-size:22px;color:#00ff88;}
.calc {background:#1a1a1a;padding:20px;border-radius:15px;max-width:500px;margin:20px auto;}
#paymentOptions {display:none;}
#progress-fill {height:10px;background:#00ff88;width:0%;}
</style>
</head>
<body>

<h1>🚀 Crypto Passive 2026</h1>
<p>Полный гайд + калькулятор</p>

<div class="calc">
<h2>Доход</h2>
<input type="number" id="amount" value="1000">
<select id="platform">
<option value="12">12%</option>
<option value="5">5%</option>
</select>
<button onclick="calculate()">Рассчитать</button>
<div id="result"></div>
</div>

<button id="payBtn">💰 Оплатить 5 TON</button>

<div id="paymentOptions">
<button onclick="openWallet()">💎 Открыть кошелёк</button><br>
<button onclick="copyData()">📋 Скопировать</button>
</div>

<div id="status"></div>
<div id="progress-fill"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

const userId = tg.initDataUnsafe?.user?.id || 0;
const address = "UQA4aInFqReAIe9UrFhqu-CRzhpLAGwAZJKAEYMO_KIjK0ni";
const amountTON = 5000000000;

const BACKEND_URL = "https://ТВОЙ-REPLIT-URL/check_payment";

// калькулятор
function calculate(){
  const a = document.getElementById('amount').value;
  const p = document.getElementById('platform').value;
  document.getElementById('result').innerHTML =
  `≈ ${(a*p/100/12).toFixed(2)} $/мес`;
}

// показать оплату
document.getElementById("payBtn").onclick = () => {
  document.getElementById("paymentOptions").style.display = "block";
};

// открыть кошелек
function openWallet(){
  const comment = `passiveguide_${userId}`;
  const link = `ton://transfer/${address}?amount=${amountTON}&text=${comment}`;

  navigator.clipboard.writeText(
    `Адрес: ${address}\nКомментарий: ${comment}\nСумма: 5 TON`
  );

  window.location.href = link;

  setTimeout(()=>checkPayment(comment),3000);
}

// копировать
function copyData(){
  const comment = `passiveguide_${userId}`;
  navigator.clipboard.writeText(
    `Адрес: ${address}\nКомментарий: ${comment}\nСумма: 5 TON`
  );
  alert("Скопировано");
}

// проверка оплаты
async function checkPayment(comment, attempt=1){
  if(attempt>20){
    document.getElementById("status").innerHTML = "❌ Не найдено";
    return;
  }

  try{
    const r = await fetch(BACKEND_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({comment})
    });

    const d = await r.json();

    if(d.paid){
      document.getElementById("status").innerHTML = "✅ Оплачено!";
    } else {
      setTimeout(()=>checkPayment(comment, attempt+1),5000);
    }

  }catch(e){
    setTimeout(()=>checkPayment(comment, attempt+1),5000);
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Passive 2026</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body {font-family:Arial;background:#0f0f0f;color:#fff;text-align:center;padding:20px;}
h1 {color:#00ff88;}
button {background:#00ff88;color:#000;padding:15px 40px;font-size:20px;border:none;border-radius:10px;cursor:pointer;margin:20px;transition:0.3s;}
button:disabled {background:#555;color:#ccc;cursor:default;}
#status, #progress {margin-top:20px;font-size:18px;color:#00ff88;}
</style>
</head>
<body>
<h1>🚀 Crypto Passive 2026</h1>
<p>Полный гайд + калькулятор пассивного дохода</p>
<button id="payBtn">💰 Оплатить 5 TON через Telegram Wallet</button>
<div id="status"></div>
<div id="progress"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
const userId = tg.initDataUnsafe?.user?.id || 0;
const address = "UQA4aInFqReAIe9UrFhqu-CRzhpLAGwAZJKAEYMO_KIjK0ni";
const amount = 5000000000;

async function checkPayment(comment, attempt=1){
    const statusDiv = document.getElementById("status");
    const progressDiv = document.getElementById("progress");
    if(attempt>20){
        statusDiv.innerHTML = "⚠️ Платеж не найден. Попробуйте ещё раз.";
        progressDiv.innerHTML = "";
        document.getElementById("payBtn").disabled = false;
        return;
    }
    progressDiv.innerHTML = `⏳ Проверка оплаты... попытка ${attempt}/20`;
    try {
        const resp = await fetch("https://cryptopassive-bot.drogovoz84.repl.co/check_payment", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({comment: comment})
        });
        const data = await resp.json();
        if(data.paid){
            statusDiv.innerHTML = "✅ Оплата подтверждена! PDF отправлен в Telegram.";
            progressDiv.innerHTML = "";
            document.getElementById("payBtn").disabled = true;
        } else {
            setTimeout(()=>checkPayment(comment, attempt+1), 5000);
        }
    } catch(e){
        console.error(e);
        progressDiv.innerHTML = "⚠️ Ошибка при проверке оплаты. Повтор через 5 секунд...";
        setTimeout(()=>checkPayment(comment, attempt+1), 5000);
    }
}

document.getElementById("payBtn").onclick = () => {
    if(!userId){
        alert("Открой приложение внутри Telegram!");
        return;
    }
    document.getElementById("payBtn").disabled = true;
    const comment = `passiveguide_${userId}`;
    const tonLink = `ton://transfer/${address}?amount=${amount}&text=${encodeURIComponent(comment)}`;
    window.location.href = tonLink;
    setTimeout(()=>checkPayment(comment),3000);
};
</script>
</body>
</html>

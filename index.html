<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const userId = tg.initDataUnsafe?.user?.id || 0;
const userFirstName = tg.initDataUnsafe?.user?.first_name || 'Гость';
const address = "UQA4aInFqReAIe9UrFhqu-CRzhpLAGwAZJKAEYMO_KIjK0ni";
const amountTON = 100000000;

const BACKEND_URL = "https://bb428d09-4733-4ff4-8409-0700a0314268-00-38aqagjlrdqft.riker.replit.dev/check_payment";

let isPaying = false;

tg.showPopup({
    title: '👋 Привет!',
    message: `${userFirstName}, для получения гайда:\n\n1️⃣ Нажмите "Оплатить 0.1 TON"\n2️⃣ Укажите комментарий\n3️⃣ Отправьте перевод\n\nПосле оплаты PDF придёт сюда!`,
    buttons: [{type: 'close'}]
});

function calculate() {
    const amount = parseFloat(document.getElementById('amount').value);
    const apy = parseFloat(document.getElementById('platform').value);
    
    if (isNaN(amount) || amount <= 0) {
        showStatus('Введите корректную сумму', 'error');
        return;
    }
    
    const monthly = (amount * apy / 100 / 12).toFixed(2);
    const yearly = (amount * apy / 100).toFixed(2);
    
    const resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `
        📅 <strong>Ежемесячно:</strong> ${monthly} $<br>
        📆 <strong>Годовой доход:</strong> ${yearly} $<br>
        📊 <strong>Доходность:</strong> ${apy}% годовых
    `;
}

function showStatus(message, type = 'info') {
    const statusDiv = document.getElementById('status');
    statusDiv.className = `status ${type}`;
    statusDiv.innerHTML = message;
    
    if (type !== 'error') {
        setTimeout(() => {
            if (statusDiv.innerHTML === message) {
                statusDiv.style.display = 'none';
                statusDiv.className = 'status';
            }
        }, 5000);
    }
}

function showProgress(percent, text) {
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    
    progressBar.style.display = 'block';
    progressFill.style.width = `${percent}%`;
    
    if (text) {
        showStatus(text, 'info');
    }
    
    if (percent >= 100) {
        setTimeout(() => {
            progressBar.style.display = 'none';
        }, 1000);
    }
}

function showPaymentOptions() {
    document.getElementById("paymentOptions").style.display = "flex";
}

function openWallet() {
    const comment = `passiveguide_${userId}`;
    const tonLink = `ton://transfer/${address}?amount=${amountTON}&text=${encodeURIComponent(comment)}`;
    
    const copyText = `💎 Адрес кошелька: ${address}
📝 КОММЕНТАРИЙ (обязательно!): ${comment}
💰 Сумма: 0.1 TON

⚠️ ВАЖНО:
1. Укажите комментарий ТОЧНО как выше
2. Без комментария оплата не будет засчитана
3. Сумма: ровно 0.1 TON`;
    
    navigator.clipboard.writeText(copyText);
    
    window.open(tonLink, "_blank");
    
    tg.showPopup({
        title: '💎 Инструкция по оплате',
        message: `1️⃣ Кошелёк должен открыться автоматически\n\n2️⃣ Если не открылся — вставьте данные из буфера обмена\n\n3️⃣ Обязательно укажите комментарий:\n"${comment}"\n\n4️⃣ Отправьте ровно 0.1 TON\n\nПосле оплаты PDF придёт в этот чат через 10-30 секунд`,
        buttons: [
            {id: 'copy', text: '📋 Скопировать данные'},
            {type: 'close', text: 'Закрыть'}
        ]
    }, (buttonId) => {
        if (buttonId === 'copy') {
            navigator.clipboard.writeText(copyText);
            tg.showPopup({
                title: '✅ Скопировано!',
                message: 'Данные скопированы. Вставьте их в кошелёк при оплате.',
                buttons: [{type: 'close'}]
            });
        }
    });
    
    setTimeout(() => checkPayment(comment), 3000);
}

function copyData() {
    const comment = `passiveguide_${userId}`;
    const text = `💎 Адрес: ${address}
📝 КОММЕНТАРИЙ (обязательно!): ${comment}
💰 Сумма: 0.1 TON

⚠️ ВАЖНО:
• Без комментария оплата НЕ будет засчитана
• Комментарий должен быть ТОЧНО: ${comment}
• Сумма: ровно 0.1 TON`;
    
    navigator.clipboard.writeText(text);
    
    tg.showPopup({
        title: '✅ Данные скопированы!',
        message: `Комментарий для оплаты:\n"${comment}"\n\nОбязательно укажите его при переводе!`,
        buttons: [{type: 'close'}]
    });
}

function installWallet() {
    window.open("https://ton.org/wallets", "_blank");
}

function contactSupport() {
    tg.openTelegramLink("https://t.me/AntonDrogovoz");
}

async function checkPayment(comment, attempt = 1) {
    if (isPaying) return;
    isPaying = true;
    
    const maxAttempts = 20;
    
    if (attempt > maxAttempts) {
        showStatus('⚠️ Платёж не найден. Проверьте:\n• Правильность комментария\n• Сумму 0.1 TON\n• Обратитесь в поддержку', 'error');
        showProgress(0);
        isPaying = false;
        return;
    }
    
    const percent = (attempt / maxAttempts) * 100;
    showProgress(percent, `⏳ Проверка платежа... (${attempt}/${maxAttempts})`);
    
    try {
        const resp = await fetch(BACKEND_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ comment: comment })
        });
        
        const data = await resp.json();
        
        if (data.paid) {
            showProgress(100);
            showStatus('✅ Оплата подтверждена! PDF отправлен в Telegram. Проверьте чат с ботом!', 'success');
            
            document.getElementById("payBtn").disabled = true;
            document.getElementById("paymentOptions").style.display = "none";
            
            setTimeout(() => {
                tg.showPopup({
                    title: '🎉 Успешно!',
                    message: 'PDF с гайдом отправлен в Telegram. Проверьте чат с ботом!',
                    buttons: [{type: 'close'}]
                });
            }, 1000);
            
            isPaying = false;
            return;
        }
        
        setTimeout(() => {
            isPaying = false;
            checkPayment(comment, attempt + 1);
        }, 5000);
        
    } catch(e) {
        console.error("Ошибка:", e);
        showStatus('⚠️ Ошибка соединения. Повтор через 5 секунд...', 'error');
        
        setTimeout(() => {
            isPaying = false;
            checkPayment(comment, attempt + 1);
        }, 5000);
    }
}

document.getElementById("payBtn").onclick = () => {
    if (userId === 0) {
        tg.showPopup({
            title: '⚠️ Ошибка',
            message: 'Не удалось определить пользователя. Убедитесь, что вы открыли приложение через Telegram.',
            buttons: [{type: 'close'}]
        });
        return;
    }
    showPaymentOptions();
};

console.log("👤 User ID:", userId);
console.log("🔗 Backend URL:", BACKEND_URL);
</script>

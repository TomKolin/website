<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crypto Passive 2026</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0a0a0a 0%, #0f0f0f 100%);
    color: #fff;
    padding: 20px;
    min-height: 100vh;
}

.container {
    max-width: 500px;
    margin: 0 auto;
}

h1 {
    color: #00ff88;
    font-size: 28px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.subtitle {
    color: #888;
    font-size: 14px;
    margin-bottom: 30px;
    text-align: center;
}

.calc {
    background: rgba(26, 26, 26, 0.9);
    backdrop-filter: blur(10px);
    padding: 24px;
    border-radius: 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(0, 255, 136, 0.2);
}

.calc h2 {
    font-size: 18px;
    margin-bottom: 20px;
    color: #00ff88;
}

input, select {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #fff;
    font-size: 16px;
    transition: all 0.3s;
}

input:focus, select:focus {
    outline: none;
    border-color: #00ff88;
    box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
}

button {
    background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
    color: #000;
    padding: 14px 30px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin: 10px 0;
    transition: all 0.3s;
    width: 100%;
}

button:disabled {
    background: #555;
    color: #ccc;
    cursor: not-allowed;
    transform: none;
}

button:active:not(:disabled) {
    transform: scale(0.98);
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: rgba(0, 255, 136, 0.1);
    border-radius: 12px;
    text-align: center;
}

.result strong {
    color: #00ff88;
    font-size: 24px;
}

.payment-btn {
    background: linear-gradient(135deg, #ff8800 0%, #cc6600 100%);
    margin: 20px 0;
}

.payment-options {
    display: none;
    gap: 10px;
    margin-top: 15px;
}

.payment-options button {
    background: #2a2a2a;
    color: #fff;
    margin: 5px 0;
}

.payment-options button:active {
    background: #3a3a3a;
}

.status {
    margin-top: 20px;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    font-size: 14px;
}

.status.success {
    background: rgba(0, 255, 136, 0.2);
    color: #00ff88;
    border: 1px solid #00ff88;
}

.status.error {
    background: rgba(255, 68, 68, 0.2);
    color: #ff4444;
    border: 1px solid #ff4444;
}

.status.info {
    background: rgba(255, 136, 0, 0.2);
    color: #ff8800;
    border: 1px solid #ff8800;
}

.progress-bar {
    height: 6px;
    background: #333;
    border-radius: 3px;
    margin: 15px auto;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #00ff88, #00cc66);
    width: 0%;
    transition: width 0.3s;
    border-radius: 3px;
}

.support-btn {
    background: transparent;
    border: 1px solid #00ff88;
    color: #00ff88;
    margin-top: 20px;
}

.loading {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid #fff;
    border-radius: 50%;
    border-top-color: #00ff88;
    animation: spin 0.6s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

@media (max-width: 480px) {
    body {
        padding: 15px;
    }
    
    h1 {
        font-size: 24px;
    }
    
    button {
        padding: 12px 20px;
    }
}
</style>
</head>
<body>
<div class="container">
    <h1>
        <span>🚀</span>
        Crypto Passive 2026
        <span>💎</span>
    </h1>
    <div class="subtitle">Полный гайд + калькулятор пассивного дохода</div>

    <div class="calc">
        <h2>📊 Калькулятор дохода</h2>
        <input type="number" id="amount" value="1000" placeholder="Введите сумму в $" step="100">
        <select id="platform">
            <option value="12">💰 MEXC/Bybit (~12% годовых)</option>
            <option value="5">💎 TON Staking (~5% годовых)</option>
            <option value="8">📈 Binance Earn (~8% годовых)</option>
        </select>
        <button onclick="calculate()">📈 Рассчитать доход</button>
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <button id="payBtn" class="payment-btn">💰 Оплатить 0.1 TON</button>

    <div id="paymentOptions" class="payment-options">
        <button onclick="openWallet()">💎 Открыть TON Wallet</button>
        <button onclick="copyData()">📋 Скопировать реквизиты</button>
        <button onclick="installWallet()">📲 Установить кошелёк</button>
    </div>

    <div id="status"></div>
    <div class="progress-bar" id="progressBar" style="display: none;">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <button id="supportBtn" class="support-btn" onclick="contactSupport()">💬 Поддержка</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand(); // Разворачиваем на весь экран

const userId = tg.initDataUnsafe?.user?.id || 0;
const userFirstName = tg.initDataUnsafe?.user?.first_name || 'Гость';
const address = "UQA4aInFqReAIe9UrFhqu-CRzhpLAGwAZJKAEYMO_KIjK0ni";
const amountTON = 100000000; // 0.1 TON

// URL бэкенда (обнови при необходимости)
const BACKEND_URL = "https://bb428d09-4733-4ff4-8409-0700a0314268-00-38aqagjlrdqft.riker.replit.dev/check_payment";

let isPaying = false;

// Приветствие
tg.showAlert(`Привет, ${userFirstName}! 👋\n\nНажми на кнопку оплаты, чтобы получить гайд по пассивному доходу.`);

function calculate() {
    const amount = parseFloat(document.getElementById('amount').value);
    const apy = parseFloat(document.getElementById('platform').value);
    
    if (isNaN(amount) || amount <= 0) {
        showStatus('Введите корректную сумму', 'error');
        return;
    }
    
    const monthly = (amount * apy / 100 / 12).toFixed(2);
    const yearly = (amount * apy / 100).toFixed(2);
    
    const resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `
        📅 <strong>Ежемесячно:</strong> ${monthly} $<br>
        📆 <strong>Годовой доход:</strong> ${yearly} $<br>
        📊 <strong>Доходность:</strong> ${apy}% годовых
    `;
}

function showStatus(message, type = 'info') {
    const statusDiv = document.getElementById('status');
    statusDiv.className = `status ${type}`;
    statusDiv.innerHTML = message;
    
    if (type !== 'error') {
        setTimeout(() => {
            if (statusDiv.innerHTML === message) {
                statusDiv.style.display = 'none';
                statusDiv.className = 'status';
            }
        }, 5000);
    }
}

function showProgress(percent, text) {
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    
    progressBar.style.display = 'block';
    progressFill.style.width = `${percent}%`;
    
    if (text) {
        showStatus(text, 'info');
    }
    
    if (percent >= 100) {
        setTimeout(() => {
            progressBar.style.display = 'none';
        }, 1000);
    }
}

function showPaymentOptions() {
    document.getElementById("paymentOptions").style.display = "flex";
    tg.MainButton.setText('Продолжить оплату').show();
}

function openWallet() {
    const comment = `passiveguide_${userId}`;
    const tonLink = `ton://transfer/${address}?amount=${amountTON}&text=${encodeURIComponent(comment)}`;
    
    navigator.clipboard.writeText(`Адрес: ${address}\nКомментарий: ${comment}\nСумма: 0.1 TON`);
    
    // Пробуем открыть кошелёк
    window.open(tonLink, "_blank");
    
    showStatus('💰 Кошелёк открывается...\nДанные скопированы в буфер обмена', 'info');
    
    setTimeout(() => {
        tg.showPopup({
            title: '💎 Оплата',
            message: 'Если кошелёк не открылся автоматически:\n1. Вставьте данные из буфера\n2. Укажите комментарий\n3. Отправьте 0.1 TON',
            buttons: [{type: 'ok'}]
        });
    }, 2000);
    
    setTimeout(() => checkPayment(comment), 3000);
}

function copyData() {
    const comment = `passiveguide_${userId}`;
    const text = `💎 Адрес: ${address}\n📝 Комментарий: ${comment}\n💰 Сумма: 0.1 TON\n\n⚠️ Обязательно укажите комментарий!`;
    
    navigator.clipboard.writeText(text);
    showStatus('✅ Данные скопированы! Вставьте их в кошелёк.', 'success');
}

function installWallet() {
    window.open("https://ton.org/wallets", "_blank");
}

function contactSupport() {
    tg.openTelegramLink("https://t.me/AntonDrogovoz");
}

async function checkPayment(comment, attempt = 1) {
    if (isPaying) return;
    isPaying = true;
    
    const maxAttempts = 20;
    
    if (attempt > maxAttempts) {
        showStatus('⚠️ Платёж не найден. Проверьте:\n• Правильность комментария\n• Сумму 0.1 TON\n• Обратитесь в поддержку', 'error');
        showProgress(0);
        isPaying = false;
        return;
    }
    
    const percent = (attempt / maxAttempts) * 100;
    showProgress(percent, `⏳ Проверка платежа... (${attempt}/${maxAttempts})`);
    
    try {
        const resp = await fetch(BACKEND_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ comment: comment })
        });
        
        const data = await resp.json();
        
        if (data.paid) {
            showProgress(100);
            showStatus('✅ Оплата подтверждена! PDF отправлен в Telegram. Проверьте чат с ботом!', 'success');
            
            document.getElementById("payBtn").disabled = true;
            document.getElementById("paymentOptions").style.display = "none";
            
            tg.MainButton.hide();
            tg.close(); // Предлагаем закрыть мини-приложение
            
            setTimeout(() => {
                tg.showPopup({
                    title: '🎉 Успешно!',
                    message: 'PDF с гайдом отправлен в Telegram. Проверьте чат с ботом!',
                    buttons: [{type: 'close'}]
                });
            }, 1000);
            
            isPaying = false;
            return;
        }
        
        setTimeout(() => {
            isPaying = false;
            checkPayment(comment, attempt + 1);
        }, 5000);
        
    } catch(e) {
        console.error("Ошибка:", e);
        showStatus('⚠️ Ошибка соединения. Повтор через 5 секунд...', 'error');
        
        setTimeout(() => {
            isPaying = false;
            checkPayment(comment, attempt + 1);
        }, 5000);
    }
}

document.getElementById("payBtn").onclick = () => {
    if (userId === 0) {
        tg.showPopup({
            title: '⚠️ Ошибка',
            message: 'Не удалось определить пользователя. Убедитесь, что вы открыли приложение через Telegram.',
            buttons: [{type: 'close'}]
        });
        return;
    }
    showPaymentOptions();
};

// Настройка главной кнопки Telegram
tg.MainButton.onClick(() => {
    openWallet();
    tg.MainButton.hide();
});

// Логирование для отладки
console.log("👤 User ID:", userId);
console.log("👤 User Name:", userFirstName);
console.log("🔗 Backend URL:", BACKEND_URL);
</script>
</body>
</html>
